<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            margin: 0; height: 100vh; display: flex; justify-content: center;
            align-items: center; background: #121417; gap: 50px;
        }

        /* Chiroq (Lamp) qismi */
        .lamp-container {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            position: relative; transition: 0.3s;
        }
        .lamp-line { width: 4px; height: 100px; background: #2c3138; border-radius: 2px; }
        .lamp-bulb {
            width: 50px; height: 50px; background: #2c3138; border-radius: 50%;
            margin-top: -5px; transition: 0.3s; position: relative;
        }
        /* Chiroq yongandagi holat */
        .lamp-container.on .lamp-bulb {
            background: #f1c40f;
            box-shadow: 0 0 50px #f1c40f, 0 0 100px #f1c40f;
        }
        .lamp-text { color: #555; font-size: 12px; margin-top: 10px; }

        /* Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 40px 30px; border-radius: 20px; width: 350px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1); text-align: center;
        }
        h2 { color: white; margin-bottom: 30px; }
        input {
            width: 100%; padding: 12px; background: #1a1d21; border: 1px solid #2c3138;
            border-radius: 10px; color: white; margin-bottom: 20px; outline: none;
        }
        .btn-sign-in {
            width: 100%; padding: 12px; background: #f1c40f; border: none;
            border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        .error-msg { color: #e74c3c; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Member Login</h2>
        {% if error %}<p class="error-msg">{{ error }}</p>{% endif %}
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" id="passwordField" name="password" placeholder="Password" required>
            <button type="submit" class="btn-sign-in">Sign in</button>
        </form>
    </div>

    <div class="lamp-container" id="lamp">
        <div class="lamp-line"></div>
        <div class="lamp-bulb"></div>
        <p class="lamp-text">Lamp (click)</p>
    </div>

    <script>
        const lamp = document.getElementById('lamp');
        const passwordField = document.getElementById('passwordField');

        lamp.addEventListener('click', () => {
            // Chiroqni yoqish/o'chirish klassini qo'shish
            lamp.classList.toggle('on');

            // Parolni ko'rsatish yoki yashirish
            if (passwordField.type === "password") {
                passwordField.type = "text";
            } else {
                passwordField.type = "password";
            }
        });
    </script>
</body>
</html>
