{% extends 'base.html' %}
{% block content %}
<h2 style="color: #2c3e50; margin-bottom: 20px;">📚 Guruh: {{ group.name }} (Davomat)</h2>

<form method="post" style="background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    {% csrf_token %}
    <table style="width: 100%; border-collapse: collapse;">
        <thead style="background: #f8f9fa;">
            <tr>
                <th style="padding: 15px; text-align: left;">O'quvchi</th>
                <th style="padding: 15px;">Darsda?</th>
                <th style="padding: 15px;">Kelmaslik sababi / Izoh</th>
            </tr>
        </thead>
        <tbody>
            {% for s in students %}
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 15px; font-weight: 500;">{{ s.full_name }}</td>
                <td style="padding: 15px; text-align: center;">
                    <input type="checkbox" name="attendance_{{ s.id }}" checked 
                           id="check_{{ s.id }}"
                           onchange="toggleReason('{{ s.id }}')"
                           style="transform: scale(1.6); cursor: pointer;">
                </td>
                <td style="padding: 15px;">
                    <div id="reason_box_{{ s.id }}" style="display: none; gap: 10px;">
                        <select name="reason_{{ s.id }}" style="padding: 8px; border-radius: 8px; border: 1px solid #ddd;">
                            <option value="sababsiz">🔴 Sababsiz</option>
                            <option value="sababli">🟡 Sababli</option>
                        </select>
                        <input type="text" name="comment_{{ s.id }}" placeholder="Qisqa izoh..." 
                               style="padding: 8px; border-radius: 8px; border: 1px solid #ddd; width: 200px;">
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
    <div style="margin-top: 25px; text-align: right;">
        <button type="submit" class="btn btn-add" style="padding: 12px 30px; font-size: 16px; border-radius: 10px; cursor: pointer;">
            💾 Davomatni saqlash
        </button>
    </div>
</form>

<script>
    function toggleReason(id) {
        var checkBox = document.getElementById("check_" + id);
        var reasonBox = document.getElementById("reason_box_" + id);
        if (checkBox.checked == false) {
            reasonBox.style.display = "flex";
        } else {
            reasonBox.style.display = "none";
        }
    }
</script>
{% endblock %}
