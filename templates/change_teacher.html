{% extends 'base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <h2 style="color: #2c3e50; text-align: center;">Ustozni almashtirish</h2>
    
    <div style="background: #f8f9fa; padding: 15px; border-left: 5px solid #3498db; margin-bottom: 20px;">
        <p style="margin: 0;">Guruh: <b>{{ group.name }}</b></p>
        <p style="margin: 5px 0 0 0;">Hozirgi ustoz: <span style="color: #e67e22; font-weight: bold;">{{ group.teacher }}</span></p>
    </div>

    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label for="new_teacher" style="display: block; margin-bottom: 8px; font-weight: bold;">Yangi ustozni tanlang:</label>
            <select name="new_teacher" id="new_teacher" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px;">
                <option value="" disabled selected>--- Ustozlar ro'yxati ---</option>
                {% for t in teachers %}
                    {% if t.id != group.teacher.id %}
                        <option value="{{ t.id }}">{{ t.user.get_full_name|default:t.user.username }}</option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-add" style="flex: 2; padding: 12px; font-weight: bold;">💾 O'zgarishni saqlash</button>
            <a href="{% url 'group_list' %}" style="flex: 1; text-align: center; padding: 12px; background: #95a5a6; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">Bekor qilish</a>
        </div>
    </form>
</div>
{% endblock %}
