<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>O'quv Markazi CRM</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f4f7f6; }
        nav { background: #2c3e50; padding: 15px; color: white; display: flex; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #3498db; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
        .btn { padding: 8px 15px; border-radius: 5px; text-decoration: none; color: white; cursor: pointer; border: none; }
        .btn-add { background: #27ae60; }
        .btn-edit { background: #f1c40f; color: black; }
        .btn-delete { background: #e74c3c; }
        .btn-info { background: #3498db; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'dashboard' %}">🏠 Asosiy</a>
        <a href="{% url 'student_list' %}">🎓 O'quvchilar</a>
        <a href="{% url 'group_list' %}">📚 Guruhlar</a>
        <a href="{% url 'teacher_list' %}">👨‍🏫 Ustozlar</a>
        <a href="{% url 'attendance_report' %}">Davomat Hisoboti</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
